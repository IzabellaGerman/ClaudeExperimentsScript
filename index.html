<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #1a1a2e; color: #eee;
    flex-direction: column; gap: 24px;
  }
  h1 { font-size: 2rem; letter-spacing: 2px; }
  .status {
    font-size: 1.3rem; min-height: 2rem;
    transition: color 0.3s;
  }
  .status.win { color: #00d2ff; font-weight: bold; }
  .status.draw { color: #ffc107; font-weight: bold; }
  .board {
    display: grid; grid-template-columns: repeat(3, 120px); grid-template-rows: repeat(3, 120px);
    gap: 6px;
  }
  .cell {
    background: #16213e; border: 2px solid #0f3460;
    font-size: 3rem; font-weight: bold; cursor: pointer;
    display: flex; justify-content: center; align-items: center;
    border-radius: 8px; transition: background 0.2s, transform 0.15s;
    user-select: none;
  }
  .cell:hover:not(.taken) { background: #1a2a50; transform: scale(1.05); }
  .cell.taken { cursor: default; }
  .cell.x { color: #e94560; }
  .cell.o { color: #00d2ff; }
  .cell.win-cell { background: #0f3460; animation: pulse 0.6s ease-in-out infinite alternate; }
  @keyframes pulse { to { background: #1a4a80; } }
  .controls { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
  button {
    padding: 10px 24px; font-size: 1rem; border: none; border-radius: 6px;
    cursor: pointer; background: #e94560; color: #fff; font-weight: bold;
    transition: background 0.2s;
  }
  button:hover { background: #c73550; }
  .mode-btn { background: #0f3460; }
  .mode-btn:hover { background: #1a4a80; }
  .mode-btn.active { background: #e94560; }
  .score {
    display: flex; gap: 32px; font-size: 1.1rem;
  }
  .score span { font-weight: bold; }
  .score .x-score { color: #e94560; }
  .score .o-score { color: #00d2ff; }
</style>
</head>
<body>
<h1>TIC TAC TOE</h1>
<div class="controls">
  <button class="mode-btn active" onclick="setMode('pvp')">2 Players</button>
  <button class="mode-btn" onclick="setMode('easy')">vs AI (Easy)</button>
  <button class="mode-btn" onclick="setMode('hard')">vs AI (Hard)</button>
</div>
<div class="score">
  <div>X: <span class="x-score">0</span></div>
  <div>Draws: <span class="d-score">0</span></div>
  <div>O: <span class="o-score">0</span></div>
</div>
<div class="status">X's turn</div>
<div class="board" id="board"></div>
<button onclick="resetGame()">New Game</button>

<script src="game.js"></script>
<script>
let board, turn, gameOver, mode, scores;
const statusEl = document.querySelector('.status');
const boardEl = document.getElementById('board');

function init() {
  scores = { X: 0, O: 0, D: 0 };
  mode = 'pvp';
  resetGame();
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach((btn, i) => {
    btn.classList.toggle('active', btn.textContent.includes(
      m === 'pvp' ? '2 Players' : m === 'easy' ? 'Easy' : 'Hard'
    ));
  });
  scores = { X: 0, O: 0, D: 0 };
  updateScores();
  resetGame();
}

function resetGame() {
  board = Array(9).fill('');
  turn = 'X';
  gameOver = false;
  statusEl.textContent = "X's turn";
  statusEl.className = 'status';
  render();
}

function render() {
  boardEl.innerHTML = '';
  board.forEach((val, i) => {
    const cell = document.createElement('div');
    cell.className = 'cell' + (val ? ' taken ' + val.toLowerCase() : '');
    cell.textContent = val;
    cell.addEventListener('click', () => handleClick(i));
    boardEl.appendChild(cell);
  });
}

function handleClick(i) {
  if (board[i] || gameOver) return;
  if (mode !== 'pvp' && turn === 'O') return;
  makeMove(i);
  if (!gameOver && mode !== 'pvp' && turn === 'O') {
    setTimeout(aiMove, 300);
  }
}

function makeMove(i) {
  board[i] = turn;
  const win = checkWin(board, turn);
  if (win) {
    gameOver = true;
    scores[turn]++;
    updateScores();
    statusEl.textContent = turn + ' wins!';
    statusEl.className = 'status win';
    render();
    win.forEach(idx => boardEl.children[idx].classList.add('win-cell'));
    return;
  }
  if (board.every(c => c)) {
    gameOver = true;
    scores.D++;
    updateScores();
    statusEl.textContent = "It's a draw!";
    statusEl.className = 'status draw';
    render();
    return;
  }
  turn = turn === 'X' ? 'O' : 'X';
  statusEl.textContent = turn + "'s turn";
  render();
}

function aiMove() {
  if (gameOver) return;
  const i = mode === 'hard' ? bestMove(board) : easyMove(board);
  makeMove(i);
}

function updateScores() {
  document.querySelector('.x-score').textContent = scores.X;
  document.querySelector('.o-score').textContent = scores.O;
  document.querySelector('.d-score').textContent = scores.D;
}

init();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
